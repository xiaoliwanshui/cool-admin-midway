      padding: 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }

      color: #fff;
      margin: 0;
    }
    
    .controls {
      margin-bottom: 20px;
      text-align: center;
    }
    
    .controls button {
      margin: 0 10px;
      padding: 8px 16px;
      background: #409EFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    
    .controls button:hover {
      background: #66b1ff;
    }
    
    #map-container {
      width: 100%;
      height: 700px;
      border-radius: 4px;
    }
    
    .info-panel {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0, 2, 89, 0.8);
      border-radius: 4px;
    }
    
    .info-panel h3 {
      margin-top: 0;
      color: #fff;
    }
    
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
      flex-wrap: wrap;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .legend-color {
      width: 20px;
      height: 20px;
      border-radius: 3px;
    }
    
    .ui-map-img {
      padding: 10px;
    }
    
    .ui-maptxt {
      font-weight: bold;
      margin-bottom: 10px;
    }
    
    .video-container {
      width: 200px;
      height: auto;
    }

          properties: { name: 'Mexico' },
          geometry: {
            type: 'Point',
            coordinates: [-102.5528, 23.6345]
          }
        }
      ]
    };
    
    // 渲染地图
    function renderMap(mapType, dataView) {
      currentMapType = mapType;
      currentDataView = dataView;
      
      // 配置选项
      var option = {
         backgroundColor: "#003366",
         title: {
            show: true,
            text: "项目分布图",
            x: 'center',
            top: "10",
            textStyle: {
               color: "#fff",
               fontFamily: "等线",
               fontSize: 18,
            },
         },
         tooltip: {
            trigger: 'item',
            position: function (point, params, dom, rect, size) {
               var x = 0; // x坐标位置
               var y = 0; // y坐标位置
               // 当前鼠标位置
               var pointX = point[0];
               var pointY = point[1];
               // 提示框大小
               var boxWidth = size.contentSize[0];
               var boxHeight = size.contentSize[1];

               // boxWidth > pointX 说明鼠标左边放不下提示框
               if (boxWidth > pointX) {
                  x = pointX + 10;
               } else { // 左边放的下
                  x = pointX - boxWidth - 10;
               }

               // boxHeight > pointY 说明鼠标上边放不下提示框
               if (boxHeight > pointY) {
                  y = 5;
               } else { // 上边放得下
                  y = pointY - boxHeight;
               }
               return [x, y];
            },
            show: true,
            enterable: true,
            textStyle: {
               fontSize: 13,
               color: '#fff',
            },
            backgroundColor: 'rgba(0,2,89,0.8)',
            formatter: function (params) {
               if (geoCoordMapVideo[params.name]) {
                  const videoSrc = geoCoordMapVideo[params.name].src || '';
                  return `
                               <div class="ui-map-img">
                                  <div class='ui-maptxt'>${params.name}</div>
                                       <div class="video-container">
                                           <video 
                          src="./video/${videoSrc}" 
                          muted 
                          autoplay 
                          style="width: 200px; height: auto; display: block; margin-top: 10px;">
                          您的浏览器不支持视频播放。
                      </video>
                  </div>
              </div>
          `;
               } else {
                  return params.name + ': ' + params.value;
               }
            }
         },
         geo: [{
            layoutCenter: ['50%', '50%'], //位置
            layoutSize: '180%', //大小
            show: true,
            map: mapType,
            roam: false,
            zoom: 0.65,
            aspectScale: 1,
            label: {
               normal: {
                  show: false,
                  textStyle: {
                     color: '#fff'
                  }
               },
               emphasis: {
                  show: false,
                  textStyle: {
                     color: '#fff'
                  }
               }
            },
            itemStyle: {
               normal: {
                  areaColor: {
                     type: "linear",
                     x: 1200,
                     y: 0,
                     x2: 0,
                     y2: 0,
                     colorStops: [{
                        offset: 0,
                        color: "rgba(3,27,78,0.75)", // 0% 处的颜色
                     }, {
                        offset: 1,
                        color: "rgba(58,149,253,0.75)", // 50% 处的颜色
                     },],
                     global: true, // 缺省为 false
                  },
                  borderColor: "#c0f3fb",
                  borderWidth: 1,
                  shadowColor: "#8cd3ef",
                  shadowOffsetY: 10,
                  shadowBlur: 120,
               },
               emphasis: {
                  areaColor: "rgba(0,254,233,0.6)",
               }
            }
         }, {
            type: "map",
            map: mapType,
            zlevel: -1,
            aspectScale: 1,
            zoom: 0.65,
            layoutCenter: ["50%", "51%"],
            layoutSize: "180%",
            roam: false,
            silent: true,
            itemStyle: {
               normal: {
                  borderWidth: 1,
                  // borderColor:"rgba(17, 149, 216,0.6)",
                  borderColor: "rgba(58,149,253,0.8)",
                  shadowColor: "rgba(172, 122, 255,0.5)",
                  shadowOffsetY: 5,
                  shadowBlur: 15,
               },
            },
         }, {
            type: "map",
            map: mapType,
            zlevel: -2,
            aspectScale: 1,
            zoom: 0.65,
            layoutCenter: ["50%", "52%"],
            layoutSize: "180%",
            roam: false,
            silent: true,
            itemStyle: {
               normal: {
                  borderWidth: 1,
                  // borderColor: "rgba(57, 132, 188,0.4)",
                  borderColor: "rgba(58,149,253,0.6)",
                  shadowColor: "rgba(65, 214, 255,1)",
                  shadowOffsetY: 5,
                  shadowBlur: 15,
                  areaColor: "rgba(5,21,35,0.1)",
               },
            },
         }, {
            type: "map",
            map: mapType,
            zlevel: -3,
            aspectScale: 1,
            zoom: 0.65,
            layoutCenter: ["50%", "53%"],
            layoutSize: "180%",
            roam: false,
            silent: true,
            itemStyle: {
               normal: {
                  borderWidth: 1,
                  // borderColor: "rgba(11, 43, 97,0.4)",
                  borderColor: "rgba(58,149,253,0.4)",
                  shadowColor: "rgba(58,149,253,1)",
                  shadowOffsetY: 5,
                  shadowBlur: 10,
                  areaColor: "transpercent",
               },
            },
         }, {
            type: "map",
            map: mapType,
            zlevel: -4,
            aspectScale: 1,
            zoom: 0.65,
            layoutCenter: ["50%", "54%"],
            layoutSize: "180%",
            roam: false,
            silent: true,
            itemStyle: {
               normal: {
                  borderWidth: 5,
                  // borderColor: "rgba(11, 43, 97,0.8)",
                  borderColor: "rgba(5,9,57,0.8)",
                  shadowColor: "rgba(29, 111, 165,0.8)",
                  shadowOffsetY: 15,
                  shadowBlur: 10,
                  areaColor: "rgba(5,21,35,0.1)",
               },
            },
         },],
         series: [
            {
               type: 'map',
               map: mapType,
               geoIndex: 0,
               aspectScale: 1, //长宽比
               zoom: 0.65,
               showLegendSymbol: true,
               roam: true,
               label: {
                  normal: {
                     show: true,
                     textStyle: {
                        color: "#fff",
                        fontSize: "120%"
                     },
                  },
                  emphasis: {
                     show: false,
                  },
               },
               itemStyle: {
                  normal: {
                     areaColor: {
                        type: "linear",
                        x: 1200,
                        y: 0,
                        x2: 0,
                        y2: 0,
                        colorStops: [{
                           offset: 0,
                           color: "rgba(3,27,78,0.75)", // 0% 处的颜色
                        }, {
                           offset: 1,
                           color: "rgba(58,149,253,0.75)", // 50% 处的颜色
                        },],
                        global: true, // 缺省为 false
                     },
                     borderColor: "#fff",
                     borderWidth: 0.2,
                  },
               },
               layoutCenter: ["50%", "50%"],
               layoutSize: "180%",
               animation: false,
               markPoint: {
                  symbol: "none"
               },
               data: data,
            },
            {
               name: '坐标点',
               type: 'effectScatter',
               coordinateSystem: 'geo',
               data: scatterData,
               symbolSize: function (val) {
                  return val[2] / 10; // 根据第三个值调整大小
               },
               showEffectOn: 'render',
               rippleEffect: {
                  brushType: 'stroke'
               },
               hoverAnimation: true,
               label: {
                  formatter: '{b}',
                  position: 'right',
                  show: true
               },
               itemStyle: {
                  color: {
                     type: 'radial',
                     x: 0.5,
                     y: 0.5,
                     r: 0.5,
                     colorStops: [
                        {
                           offset: 0,
                           color: 'rgba(255, 255, 255, 1)' // 中心白色
                        },
                        {
                           offset: 1,
                           color: 'rgba(255, 255, 255, 0)' // 边缘透明
                        }
                     ]
                  },
                  shadowBlur: 10,
                  shadowColor: 'rgba(255, 255, 255, 0.5)'
               },
               zlevel: 1
            }
         ],
      };

      // 应用配置并渲染
      myChart.setOption(option);
      
      // 跳动效果函数
      function startTooltipJump() {
         if (isTooltipPaused) return;

         // 清除之前的定时器（防止重复）
         if (tooltipInterval) clearInterval(tooltipInterval);

         tooltipInterval = setInterval(() => {
            // 先隐藏之前的tooltip
            myChart.dispatchAction({ type: 'hideTip' });

            const currentProvince = provinces[currentIndex];
            const coord = geoCoordMap[currentProvince] ||
               geoCoordMap[currentProvince + '市'] ||
               geoCoordMap[currentProvince + '省'];

            if (coord) {
               // 获取地理坐标对应的像素坐标
               const pixelCoord = myChart.convertToPixel({ seriesIndex: 0 }, coord);

               // 显示当前省份的tooltip
               myChart.dispatchAction({
                  type: 'showTip',
                  seriesIndex: 0,
                  dataIndex: data.findIndex(item => item.name === currentProvince),
                  position: pixelCoord
               });

               currentIndex = (currentIndex + 1) % provinces.length;
            } else {
               console.warn(`未找到省份 ${currentProvince} 的坐标`);
               currentIndex = (currentIndex + 1) % provinces.length;
            }
         }, 3000);
      }

      // 开始跳动
      startTooltipJump();

      // 暂停跳动
      function stopTooltipJump() {
         if (tooltipInterval) {
            clearInterval(tooltipInterval);
            tooltipInterval = null;
         }

         // 隐藏最后显示的 tooltip
         myChart.dispatchAction({ type: 'hideTip' });
         isTooltipPaused = true;
      }

      // 恢复跳动
      function resumeTooltipJump() {
         isTooltipPaused = false;
         startTooltipJump();
      }

      // 鼠标移入暂停跳动
      myChart.on('mouseover', function () {
         stopTooltipJump();
      });

      // 鼠标移出恢复跳动
      myChart.on('mouseout', function () {
         resumeTooltipJump();
      });

      // 添加点击事件
      myChart.on('click', function (params) {
         console.log("这是点击部位的参数", params);
         if (params.name) {
            console.log("这是点击部位的参数", geoCoordMap[params.name]);
            document.getElementById('map-info').innerHTML = 
              `<strong>您点击了:</strong> ${params.name}<br/>
               项目数量: ${params.value}`;
         }
      });
    }
    
    // 切换到中国地图
    function switchToChinaMap() {
      renderMap('china', currentDataView);
    }
    
    // 切换到世界地图
    function switchToWorldMap() {
      renderMap('world', currentDataView);
    }
    
    // 切换数据视图（项目数/人口/GDP）
    function toggleDataView() {
      const newDataView = currentDataView === 'projects' ? 'population' : 
                         currentDataView === 'population' ? 'gdp' : 'projects';
      renderMap(currentMapType, newDataView);
    }
    
    // 重置视图
    function resetView() {
      renderMap('china', 'projects');
    }
    
    // 页面加载完成后初始化地图
    document.addEventListener('DOMContentLoaded', function() {
      initMap();
    });
  </script>
</body>
